<div class="grid">
    <div class="col-12">
        <div class="card p-fluid">
            <form [formGroup]="formSetting">
                <div class="grid">
                    <div class="col-12 md:col-6 pb-0">
                        <div class="field">
                            <label htmlFor="location">สถานที่ตรวจ</label>
                            <p-dropdown [options]="locations" optionLabel="name" [filter]="true" filterBy="name"
                                placeholder="เลือกสถานที่ตรวจ" formControlName="location" (onChange)="selectLocation()">
                            </p-dropdown>
                        </div>
                    </div>
                    <div class="col-12 md:col-6">
                        <div class="field">
                            <label htmlFor="location">ห้องที่ตรวจ</label>
                            <p-dropdown [options]="rooms" optionLabel="name" [filter]="true" filterBy="name"
                                placeholder="เลือกห้องตรวจ" formControlName="room" (onChange)="selectRoom()">
                            </p-dropdown>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <div class="col-12">
        <div class="card">
            <p-table #dt [value]="data" [lazy]="true" (onLazyLoad)="loadTable($event)" dataKey="id" [paginator]="true"
                [loading]="loading" [rows]="10" [totalRecords]="totalRecords" styleClass="p-datatable-gridlines"
                [rowsPerPageOptions]="[10, 25, 50]">
                <ng-template pTemplate="caption">
                    <div class="flex justify-content-between flex-column sm:flex-row">
                        <span class="p-input-icon-left">
                            <i class="pi pi-search"></i>
                            <input pInputText type="text" [formControl]="search" placeholder="ค้นหา" class="w-full" />
                        </span>

                        <div class="pt-1 flex align-items-center" *ngIf="permissions?.manag_patient">
                            <button *ngIf="formSetting.get('location')?.value && formSetting.get('room')?.value" (click)="reportRoom()" pButton
                                icon="pi pi-file-pdf" class="p-button-secondary mr-2 outline" label="รายงาน"
                                style="width:auto;"></button>

                        </div>
                    </div>
                </ng-template>

                <ng-template pTemplate="header">
                    <tr>
                        <th style="width: auto;">
                            <div class="flex justify-content-start align-items-center">
                                เลขที่
                            </div>
                        </th>
                        <th style="width: auto;">
                            <div class="flex justify-content-start align-items-center">
                                ชื่อ
                            </div>
                        </th>
                        <th style="width: auto;">
                            <div class="flex justify-content-start align-items-center">
                                นามสกุล
                            </div>
                        </th>

                        <th style="width: 100px;">
                            <div class="flex justify-content-center align-items-center">
                                เพศ
                            </div>
                        </th>

                        <th style="width: 100px;">
                            <div class="flex justify-content-center align-items-center">
                                อายุ
                            </div>
                        </th>

                        <th style="width: 100px;">
                            <div class="flex justify-content-center align-items-center">
                                สถานะ
                            </div>
                        </th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-item let-rowIndex="rowIndex">
                    <tr>
                        <td class="text-left">
                            {{item.code}}
                        </td>

                        <td class="text-left">
                            {{item.first_name}}
                        </td>

                        <td class="text-left">
                            {{item.last_name}}
                        </td>

                        <td class="text-center">
                            <span *ngIf="item.gender=='M'">ชาย</span>
                            <span *ngIf="item.gender=='F'">หญิง</span>
                        </td>

                        <td class="text-center">
                            {{item.age}}
                        </td>

                        <td class="text-center" [ngSwitch]="item.checkup_status">
                            <p-tag *ngSwitchCase="'pending'" value="รอตรวจ" />
                            <p-tag *ngSwitchCase="'completed'" severity="success" value="ตรวจแล้ว" />
                        </td>
                    </tr>
                </ng-template>
                <ng-template pTemplate="emptymessage" let-columns>
                    <tr>
                        <td [attr.colspan]="7" class="text-center">ไม่มีข้อมูล</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</div>

<p-toast position="top-right"></p-toast>
